<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 1</title>
    <style>
        :root {
            --bg: #fdf2f4; --sidebar-bg: #ffeef2; --card-bg: #ffffff;
            --text: #4a3b4a; --text-light: #6d5d6d; --accent: #c48b9d;
            --accent-hover: #b07a8c; --accent-light: #f9e6ec; --border: #e8d5db;
            --success: #8fbc8f; --star-color: #f4c542; --exam-blue: #6b9eb3;
            --shadow-sm: 0 2px 6px rgba(180,140,150,0.1);
            --shadow-md: 0 5px 20px rgba(180,140,150,0.15);
            --radius: 14px; --radius-sm: 8px; --transition: 0.2s ease;
            --font-cn: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-es: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-es); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; line-height: 1.6; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,235,240,0.7); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: #fff; padding: 2.5rem 2rem; border-radius: var(--radius); box-shadow: var(--shadow-md); text-align: center; width: 340px; border: 2px solid var(--accent-light); }
        .login-card h2 { font-family: var(--font-cn); margin-bottom: 1.5rem; color: var(--accent); }
        .login-card input { display: block; width: 100%; padding: 0.7rem; margin-bottom: 0.8rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; font-family: var(--font-es); }
        .login-card button { width: 100%; padding: 0.7rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 0.5rem; transition: background var(--transition); }
        .login-card button:hover { background: var(--accent-hover); }
        .login-error { color: #c0392b; font-size: 0.85rem; margin-top: 0.5rem; }

        .sidebar { width: 260px; min-width: 260px; background: var(--sidebar-bg); border-right: 2px solid var(--border); padding: 1.5rem 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; z-index: 10; }
        .sidebar-header { padding: 0 1rem 1rem; border-bottom: 2px solid var(--border); margin-bottom: 0.5rem; }
        .sidebar-header h1 { font-family: var(--font-cn); font-size: 1.3rem; font-weight: 700; color: var(--accent); }
        .sidebar-link { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.85rem; color: var(--accent); font-weight: 600; border-bottom: 1px solid var(--border); transition: background var(--transition); }
        .sidebar-link:hover { background: #fce4ec; }
        .sidebar-nav { flex: 1; list-style: none; padding: 0 0.5rem; }
        .sidebar-nav li { margin-bottom: 2px; }
        .sidebar-nav button { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0.5rem 0.6rem; border: none; background: transparent; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.85rem; color: var(--text); transition: all var(--transition); font-family: var(--font-es); text-align: left; }
        .sidebar-nav button:hover { background: #fce4ec; }
        .sidebar-nav button.active { background: var(--accent-light); color: #5a3d4a; font-weight: 600; }

        .menu-toggle { display: none; position: fixed; top: 10px; left: 10px; z-index: 20; background: var(--accent); color: #fff; border: none; font-size: 1.4rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; box-shadow: var(--shadow-md); }

        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; height: 100vh; }
        .topbar { padding: 1rem 1.5rem; background: #fff5f7; border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 5; flex-wrap: wrap; gap: 0.5rem; }
        .btn { padding: 0.4rem 0.9rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 0.8rem; font-family: var(--font-es); transition: all var(--transition); display: inline-flex; align-items: center; gap: 0.3rem; color: var(--text); }
        .btn:hover { background: #fce4ec; }
        .btn.accent { background: var(--accent); color: #fff; border: none; }
        .btn.exam-btn { background: var(--exam-blue); color: #fff; border: none; font-weight: 600; }
        .btn.success { background: var(--success); color: #fff; border: none; }
        .btn.audio-btn { width: 30px; height: 30px; padding: 0; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.9rem; background: var(--accent-light); border: none; cursor: pointer; flex-shrink: 0; color: var(--accent); }
        .star-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 0 0.2rem; color: #ccc; transition: color var(--transition); }
        .star-btn.active { color: var(--star-color); }
        .info-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 0 0.2rem; color: var(--accent); }

        .info-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
        }
        .info-modal-overlay.active { opacity: 1; visibility: visible; }
        .info-modal-card {
            background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-md);
            width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
            padding: 1.5rem; position: relative;
        }
        .info-modal-card .close-modal {
            position: absolute; top: 0.5rem; right: 0.8rem;
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--accent);
        }

        .content-area { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .section { margin-bottom: 2rem; }
        .section h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.8rem; color: var(--accent); }
        .vocab-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
        .vocab-table th, .vocab-table td { padding: 0.5rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .vocab-table th { background: #fff0f3; font-weight: 600; font-size: 0.75rem; color: var(--accent); }
        .vocab-table td.cn { font-family: var(--font-cn); font-size: 1.2rem; font-weight: 500; }
        .grammar-card { background: var(--card-bg); border-radius: var(--radius); padding: 1rem 1.2rem; margin-bottom: 0.8rem; box-shadow: var(--shadow-sm); border-left: 5px solid var(--accent); }
        .grammar-card h3 { font-size: 0.9rem; color: var(--accent); display: flex; align-items: center; gap: 0.4rem; }
        .grammar-detail { display: none; margin-top: 0.6rem; padding: 0.7rem; background: #fff9fa; border-radius: var(--radius-sm); font-size: 0.8rem; }
        .grammar-detail.open { display: block; }
        .grammar-mini-ex { margin-top: 0.8rem; padding: 0.6rem; background: #fdf7f9; border-radius: var(--radius-sm); border: 1px dashed var(--border); }
        .grammar-mini-ex .mini-option { display: inline-block; padding: 0.25rem 0.6rem; margin: 0.15rem; border: 1px solid var(--border); border-radius: 12px; background: #fff; cursor: pointer; font-size: 0.75rem; transition: all var(--transition); }
        .grammar-mini-ex .mini-option.correct { border-color: var(--success) !important; background: #e0f0e0 !important; }
        .grammar-mini-ex .mini-option.wrong { border-color: #e0a0a0 !important; background: #fff0f0 !important; }
        .dialogue-card { background: var(--card-bg); border-radius: var(--radius); padding: 0.8rem 1rem; margin-bottom: 0.5rem; box-shadow: var(--shadow-sm); display: flex; align-items: flex-start; gap: 0.8rem; border-left: 5px solid var(--accent-light); }
        .phrase-card { background: var(--card-bg); border-radius: var(--radius); padding: 0.8rem 1rem; margin-bottom: 0.5rem; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 0.8rem; border-left: 5px solid #f0c0d0; }
        .exercise-box { background: var(--card-bg); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow-sm); margin-bottom: 0.8rem; border: 1px solid var(--border); }
        .quiz-option, .char-option { display: inline-block; padding: 0.4rem 0.8rem; margin: 0.2rem; border: 2px solid var(--border); border-radius: var(--radius-sm); background: #fff; cursor: pointer; font-size: 0.85rem; transition: all var(--transition); }
        .quiz-option:hover, .char-option:hover { border-color: var(--accent); background: #fef5f7; }
        .quiz-option.selected, .char-option.selected { border-color: var(--exam-blue) !important; background: #e8f0f6 !important; }
        .quiz-option.correct, .char-option.correct { border-color: var(--success) !important; background: #e0f0e0 !important; }
        .quiz-option.wrong, .char-option.wrong { border-color: #e0a0a0 !important; background: #fff0f0 !important; }
        .quiz-option:disabled, .char-option:disabled { pointer-events: none; opacity: 0.7; }
        .result-badge { display: inline-block; padding: 0.3rem 0.7rem; border-radius: 15px; font-weight: 600; font-size: 0.8rem; margin-top: 0.5rem; }
        .result-badge.good { background: #e0f0e0; color: #4a7a4a; }
        .match-grid { display: flex; gap: 1.5rem; flex-wrap: wrap; }
        .match-col { flex: 1; min-width: 120px; }
        .match-item { padding: 0.5rem 0.8rem; margin-bottom: 0.3rem; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; text-align: center; background: #fff; font-size: 0.85rem; }
        .match-item.selected { border-color: var(--accent) !important; background: var(--accent-light) !important; }
        .match-item.matched { border-color: var(--success) !important; background: #e0f0e0 !important; pointer-events: none; }
        .word-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.8rem; }
        .word-chip { padding: 0.4rem 0.7rem; background: #fce4ec; border-radius: 18px; cursor: pointer; border: 2px solid transparent; font-size: 0.85rem; }
        .constructed-sentence { min-height: 2.4rem; border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 0.4rem; margin-bottom: 0.4rem; display: flex; flex-wrap: wrap; gap: 0.3rem; background: #fff; }
        .exam-result-box { background: #f9f4f6; border-radius: var(--radius); padding: 1.5rem; margin-top: 1rem; border: 2px solid var(--exam-blue); }
        .exam-result-box h3 { color: var(--exam-blue); margin-bottom: 0.8rem; }
        .exam-correction { margin: 0.4rem 0; padding: 0.4rem 0.8rem; border-radius: var(--radius-sm); font-size: 0.8rem; }
        .exam-correction.correct-ans { background: #e8f5e9; border-left: 4px solid var(--success); }
        .exam-correction.wrong-ans { background: #fef0f0; border-left: 4px solid #e0a0a0; }
        .back-arrow { cursor: pointer; font-size: 1.3rem; margin-right: 0.4rem; color: var(--accent); }
        .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #5a3d4a; color: #fff; padding: 0.5rem 1rem; border-radius: 20px; z-index: 999; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .menu-toggle { display: block; }
            .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; z-index: 15; transition: left 0.3s ease; box-shadow: var(--shadow-md); }
            .sidebar.open { left: 0; }
            .main { height: auto; padding-top: 50px; }
            .topbar { padding: 0.6rem 0.8rem; }
            .content-area { padding: 1rem; }
            .vocab-table { font-size: 0.7rem; }
            .vocab-table th, .vocab-table td { padding: 0.3rem 0.4rem; }
            .vocab-table td.cn { font-size: 1rem; }
        }
    </style>

<body>
    <div id="loginOverlay"><div class="login-card"><h2>🌸 HSK 1 · Iniciar sesión</h2><input type="text" id="loginUser" placeholder="Usuario" autocomplete="off"><input type="password" id="loginPass" placeholder="Contraseña"><button id="loginBtn">Entrar</button><p class="login-error" id="loginError"></p></div></div>

    <div id="infoModal" class="info-modal-overlay" onclick="closeInfoModal(event)">
        <div class="info-modal-card" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeInfoModal()">&times;</button>
            <div id="infoModalContent"></div>
        </div>
    </div>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><h1>中文 HSK 1</h1></div>
        <div class="sidebar-link" onclick="openStarredView()">⭐ Destacados</div>
        <div class="sidebar-link" onclick="openGamesView()">🎮 Juegos</div>
        <div class="sidebar-link" onclick="openStoriesView()">📖 Historias</div>
        <ul class="sidebar-nav" id="sidebarNav"></ul>
    </aside>
    <div class="main"><div class="topbar" id="topbar"></div><div class="content-area" id="contentArea"></div></div>
    <div id="toastContainer"></div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebarOnMobile() { if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); }

        (function() {
            const VALID_USER = 'Aprender', VALID_PASS = 'Chino';
            if (localStorage.getItem('hsk1_loggedIn') === 'true') document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('loginBtn').onclick = () => {
                if (document.getElementById('loginUser').value.trim() === VALID_USER && document.getElementById('loginPass').value.trim() === VALID_PASS) {
                    localStorage.setItem('hsk1_loggedIn', 'true'); document.getElementById('loginOverlay').style.display = 'none';
                } else document.getElementById('loginError').textContent = 'Usuario o contraseña incorrectos.';
            };
            window.logout = () => { localStorage.removeItem('hsk1_loggedIn'); location.reload(); };

            function speak(text) {
                if (!window.speechSynthesis) return; speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-CN'; u.rate = 0.7; u.pitch = 1.0;
                const v = speechSynthesis.getVoices().find(vo => vo.lang.startsWith('zh')); if (v) u.voice = v;
                speechSynthesis.speak(u);
            }
            window._speak = speak;
            function toast(m) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = m; document.getElementById('toastContainer').appendChild(t); setTimeout(() => t.remove(), 2400); }

function getSpacedPinyin(cn, fallbackPinyin) {
    // Si es un solo carácter, devuelve el pinyin original
    if (cn.length === 1) return fallbackPinyin;
    // Intenta obtener el pinyin de cada carácter desde el mapa
    const parts = cn.split('').map(c => pinyinMap[c] || null);
    // Si falta algún carácter, usa el pinyin completo sin separar
    if (parts.includes(null)) return fallbackPinyin;
    // Une los pinyin con espacio
    return parts.join(' ');

            window.toggleStar = function(vocabItem, starButton) {
                let key = typeof vocabItem === 'string' ? vocabItem : JSON.stringify(vocabItem);
                if (starredVocab.has(key)) { starredVocab.delete(key); if (starButton) starButton.classList.remove('active'); }

                    });
                    html += '</tbody></table><div style="margin-top:1.5rem;"><button class="btn accent" onclick="startStarredPractice()">▶ Practicar este vocabulario</button></div>';

            window.startStarredPractice = () => {
                if (starredVocab.size < 1) { toast('Necesitas al menos 1 palabra destacada.'); return; }
                currentView = 'starredPractice';
                const vocabArray = [...starredVocab].map(s => JSON.parse(s)).sort(() => Math.random() - 0.5).slice(0, 10);
                const fakeVocabMap = [{cn:'水',pinyin:'shuǐ',es:'agua'},{cn:'火',pinyin:'huǒ',es:'fuego'},{cn:'山',pinyin:'shān',es:'montaña'},{cn:'石',pinyin:'shí',es:'piedra'},{cn:'田',pinyin:'tián',es:'campo'},{cn:'土',pinyin:'tǔ',es:'tierra'},{cn:'花',pinyin:'huā',es:'flor'},{cn:'草',pinyin:'cǎo',es:'hierba'},{cn:'木',pinyin:'mù',es:'madera'},{cn:'金',pinyin:'jīn',es:'oro'}];
                const fakeVocabEs = fakeVocabMap.map(v => v.es);
                const exs = [];
                vocabArray.forEach(word => {
                    let wrongs = vocabArray.filter(v => v.cn !== word.cn).slice(0,4).map(v=>v.es);
                    while(wrongs.length < 4) { const randomEs = fakeVocabEs[Math.floor(Math.random()*fakeVocabEs.length)]; if (!wrongs.includes(randomEs) && randomEs !== word.es) wrongs.push(randomEs); else wrongs.push('---'); }
                    const opts = [word.es, ...wrongs].sort(() => Math.random() - 0.5);
                    exs.push({type:'choice',question:`¿Qué significa "${word.cn} (${word.pinyin})"?`,options:opts,correct:opts.indexOf(word.es)});
                    let wa = vocabArray.filter(v=>v.cn!==word.cn).slice(0,4).map(v=>`${v.cn} (${v.pinyin})`);
                    while(wa.length < 4) { const rf = fakeVocabMap[Math.floor(Math.random()*fakeVocabMap.length)]; const fs = `${rf.cn} (${rf.pinyin})`; if (!wa.includes(fs)) wa.push(fs); else wa.push('---'); }
                    const ao = [`${word.cn} (${word.pinyin})`, ...wa].sort(() => Math.random() - 0.5);
                    exs.push({type:'audio-word',audio:word.audio,options:ao,correct:ao.indexOf(`${word.cn} (${word.pinyin})`)});
                    let cw = vocabArray.filter(v=>v.cn!==word.cn).slice(0,4).map(v=>`${v.cn} (${v.pinyin})`);
                    while(cw.length < 4) { const rf = fakeVocabMap[Math.floor(Math.random()*fakeVocabMap.length)]; const fs = `${rf.cn} (${rf.pinyin})`; if (!cw.includes(fs)) cw.push(fs); else cw.push('---'); }
                    const co = [`${word.cn} (${word.pinyin})`, ...cw].sort(() => Math.random() - 0.5);
                    exs.push({type:'char-select',sentence:`___ significa "${word.es}".`,answer:word.cn,chars:co});
                });

                renderStarredPracticeView(window._starredPracticeExercises);

                let html = '<div class="section"><h2>▶ Práctica de vocabulario destacado</h2>';
                exercises.forEach((ex,i) => html += `<div class="exercise-box" id="pEx${i}"><h3>Ejercicio ${i+1}</h3></div>`);
                html += '<button class="btn accent" style="margin-top:1rem;" onclick="gradeStarredPractice()">Enviar respuestas</button><div id="practiceResult" style="margin-top:1rem;"></div></div>';
                document.getElementById('contentArea').innerHTML = html;
                exercises.forEach((ex,i) => renderExercise(document.getElementById('pEx'+i), ex, i));
                updateTopbar();
            }
            window.gradeStarredPractice = () => {
                const exs = window._starredPracticeExercises; let score = 0;
                exs.forEach((ex,i) => {
                    const box = document.getElementById('pEx'+i); if(!box) return;
                    if(ex.type==='choice'||ex.type==='audio-word'){ const all=box.querySelectorAll('.quiz-option'); if(all[0]?.disabled && ![...all].some(b=>b.classList.contains('wrong'))) score++; }
                    else if(ex.type==='char-select'){ const all=box.querySelectorAll('.char-option'); if(all[0]?.disabled && ![...all].some(b=>b.classList.contains('wrong'))) score++; }
                    else if(ex.type==='match'){ if([...box.querySelectorAll('.match-cn')].every(el=>el.classList.contains('matched'))) score++; }
                });
                document.getElementById('practiceResult').textContent = `Resultado: ${score} de ${exs.length} (${Math.round(score/exs.length*100)}%)`;
            };

            window.showInfoModal = function(detailHtml) {
                document.getElementById('infoModalContent').innerHTML = detailHtml;
                document.getElementById('infoModal').classList.add('active');
                document.body.style.overflow = 'hidden';
            };
            window.closeInfoModal = function(event) {
                if (event && event.target !== event.currentTarget) return;
                document.getElementById('infoModal').classList.remove('active');
                document.body.style.overflow = '';
            };
            document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeInfoModal(); });

            function renderContent() {
                if (currentView === 'lessonExamFull') { renderFullExamView(); return; }
                if (currentView === 'starredVocab') { renderStarredVocabView(); return; }
                if (currentView === 'starredPractice') { renderStarredPracticeView(window._starredPracticeExercises); return; }
                const data = lessonsData[lessonKeys[currentLessonIndex]];
                if (!data || !data.vocab.length) {
                    document.getElementById('contentArea').innerHTML = '<div class="section"><h2>📝 Lección no disponible</h2><p>Esta lección aún no ha sido creada.</p></div>';
                    updateTopbar(); updateSidebar(); return;
                }
                let html = '';
                html += '<div class="section"><h2>📝 Vocabulario</h2><table class="vocab-table"><thead><tr><th>汉字</th><th>Pinyin</th><th>Español</th><th>Audio</th><th>⭐</th><th>ℹ️</th></tr></thead><tbody>';
                data.vocab.forEach((v, idx) => {
                    const vocabKey = JSON.stringify({cn:v.cn, pinyin:v.pinyin, es:v.es, audio:v.audio});
                    const starred = starredVocab.has(vocabKey);
                    const detailEscaped = v.detail.replace(/"/g, '&quot;').replace(/'/g, "&#39;");
                    html += `<tr>
                        <td class="cn">${v.cn}</td><td>${getSpacedPinyin(v.cn, v.pinyin)}</td><td>${v.es}</td>
                        <td><button class="btn audio-btn" onclick="window._speak('${v.audio}')">🔊</button></td>
                        <td><button class="star-btn ${starred?'active':''}" data-vocab-key='${vocabKey.replace(/'/g,"&#39;")}' onclick="window.toggleStar({cn:'${v.cn}',pinyin:'${v.pinyin}',es:'${v.es}',audio:'${v.audio}'}, this)">★</button></td>
                        <td><button class="info-btn" onclick="showInfoModal('${detailEscaped}')">ℹ️</button></td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                if (data.grammar && data.grammar.length) {
                    html += '<div class="section"><h2>📖 Gramática</h2>';
                    data.grammar.forEach((g, i) => {
                        html += `<div class="grammar-card"><h3>${g.title} <button class="info-btn" style="background:var(--accent-light);border-radius:50%;width:24px;height:24px;font-size:0.8rem;font-weight:bold;" onclick="document.getElementById('gd_${i}').classList.toggle('open')">?</button></h3><p>${g.short}</p><div class="grammar-detail" id="gd_${i}"><p>${g.detail}</p><ul>${g.examples.map(e=>`<li>${e}</li>`).join('')}</ul></div>`;
                        if (g.miniExercises && g.miniExercises.length) {
                            html += '<div class="grammar-mini-ex">';
                            g.miniExercises.forEach((me, mei) => {
                                html += `<div><small>${mei+1}. ${me.question}</small><br>`;
                                me.options.forEach((opt, oi) => html += `<span class="mini-option" data-correct="${me.correct}" data-opt="${oi}" onclick="checkMiniGrammar(this)">${opt}</span> `);
                                html += `</div>`;
                            });
                            html += '</div>';
                        }
                        html += '</div>';
                    });
                    html += '</div>';
                }
                if (data.scenario && data.scenario.length) {
                    html += '<div class="section"><h2>💬 Diálogo</h2>';
                    data.scenario.forEach(l => html += `<div class="dialogue-card"><span class="speaker">${l.speaker}</span><div><strong>${l.cn}</strong><br><small>${l.pinyin}</small><br>${l.es}</div><button class="btn audio-btn" onclick="window._speak('${l.cn}')">🔊</button></div>`);
                    html += '</div>';
                }
                if (data.phrases && data.phrases.length) {
                    html += '<div class="section"><h2>📚 Frases</h2>';
                    data.phrases.forEach(p => html += `<div class="phrase-card"><div><strong>${p.cn}</strong><br><small>${p.pinyin}</small><br>${p.es}</div><button class="btn audio-btn" onclick="window._speak('${p.cn}')">🔊</button></div>`);
                    html += '</div>';
                }
                html += '<div class="section"><h2>✏️ Ejercicios</h2><button class="btn" style="margin-bottom:0.8rem;" onclick="resetExercises()">↻ Reiniciar todos</button>';
                data.exercises.forEach((ex, i) => html += `<div class="exercise-box" id="exBox${i}"><h3>Ejercicio ${i+1}</h3></div>`);
                html += '</div>';
                document.getElementById('contentArea').innerHTML = html;
                data.exercises.forEach((ex, i) => renderExercise(document.getElementById('exBox'+i), ex, i));
                updateTopbar(); updateSidebar();
            }

            window.resetExercises = function() {
                const data = lessonsData[lessonKeys[currentLessonIndex]];
                if (!data || !data.exercises) return;
                data.exercises.forEach((ex, i) => {
                    const box = document.getElementById('exBox'+i);
                    if (box) { box.innerHTML = `<h3>Ejercicio ${i+1}</h3>`; renderExercise(box, ex, i); }
                });
                toast('Ejercicios reiniciados');
            };
            window.checkMiniGrammar = function(el) {
                if (el.classList.contains('correct') || el.classList.contains('wrong')) return;
                const correct = parseInt(el.dataset.correct);
                const chosen = parseInt(el.dataset.opt);
                const siblings = el.parentElement.querySelectorAll('.mini-option');
                siblings.forEach(s => s.style.pointerEvents = 'none');
                if (chosen === correct) el.classList.add('correct');
                else { el.classList.add('wrong'); siblings[correct].classList.add('correct'); }
            };

            function shuffleOptions(options, correctIndex) {
                const arr = options.map((t, idx) => ({ t, isCorrect: idx === correctIndex }));
                for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
                return { options: arr.map(a => a.t), correct: arr.findIndex(a => a.isCorrect) };
            }

            function renderExercise(box, ex, idx) {
                let inner = '';
                if (ex.type === 'choice' || ex.type === 'select-phrase' || ex.type === 'audio-word') {
                    const sh = shuffleOptions(ex.options, ex.correct);
                    if (ex.type === 'audio-word') inner += `<p>Escucha y elige:</p><button class="btn audio-btn" onclick="window._speak('${ex.audio}')">🔊</button>`;
                    else inner += `<p>${ex.question}</p>`;
                    sh.options.forEach((o, i) => inner += `<button class="quiz-option" data-idx="${idx}" data-opt="${i}" data-correct="${sh.correct}" onclick="checkChoice(this)">${o}</button>`);
                } else if (ex.type === 'char-select') {
                    const sh = shuffleOptions(ex.chars, ex.chars.findIndex(c => c.startsWith(ex.answer)));
                    inner += `<p>${ex.sentence}</p>`;
                    sh.options.forEach((c, i) => inner += `<button class="char-option" data-idx="${idx}" data-char="${c.split(' (')[0]}" data-answer="${ex.answer}" onclick="checkChar(this)">${c}</button>`);
                } else if (ex.type === 'match') {
                    inner += '<p>Empareja:</p><div class="match-grid"><div class="match-col"><strong>Chino</strong>';
                    ex.pairs.forEach((p, i) => inner += `<div class="match-item match-cn" data-pair="${i}" data-side="cn" data-idx="${idx}" onclick="selectMatch(this)">${p[0]}</div>`);
                    inner += '</div><div class="match-col"><strong>Español</strong>';
                    const shuffled = [...ex.pairs].map((p,i)=>({...p,idx:i})).sort(()=>Math.random()-0.5);
                    shuffled.forEach(p => inner += `<div class="match-item match-es" data-pair="${p.idx}" data-side="es" data-idx="${idx}" onclick="selectMatch(this)">${p[1]}</div>`);
                    inner += '</div></div>';
                } else if (ex.type === 'sentence-builder' || ex.type === 'audio-order') {
                    if (ex.type === 'audio-order') inner += `<p>Escucha y ordena:</p><button class="btn audio-btn" onclick="window._speak('${ex.audio}')">🔊</button>`;
                    else inner += `<p>${ex.instruction}</p>`;
                    inner += `<div class="word-chips" id="chips${idx}"></div><div class="constructed-sentence" id="constructed${idx}"></div><button class="btn accent" onclick="checkBuilt(${idx},'${ex.correct}')">Verificar</button><button class="btn" onclick="resetBuilder(${idx})">Reiniciar</button><p id="fb${idx}"></p>`;
                    setTimeout(() => initBuilder(idx, ex.words), 0);
                }
                box.innerHTML += inner;
            }

            window.checkChoice = function(btn) { const all = btn.parentElement.querySelectorAll('.quiz-option'); if (all[0].disabled) return; const chosen = parseInt(btn.dataset.opt), correct = parseInt(btn.dataset.correct); all.forEach(b => b.disabled = true); if (chosen === correct) { btn.classList.add('correct'); btn.insertAdjacentHTML('afterend','<span class="result-badge good">✓</span>'); } else { btn.classList.add('wrong'); all[correct].classList.add('correct'); } };
            window.checkChar = function(btn) { const all = btn.parentElement.querySelectorAll('.char-option'); if (all[0].disabled) return; all.forEach(b => b.disabled = true); if (btn.dataset.char === btn.dataset.answer) { btn.classList.add('correct'); btn.insertAdjacentHTML('afterend','<span class="result-badge good">✓</span>'); } else { btn.classList.add('wrong'); all.forEach(b => { if (b.dataset.char === btn.dataset.answer) b.classList.add('correct'); }); } };
            window._matchSelected = null; window._matchFound = new Map();
            window.selectMatch = function(el) { const idx = el.dataset.idx; if (!window._matchFound.has(idx)) window._matchFound.set(idx, new Set()); const found = window._matchFound.get(idx); if (el.classList.contains('matched')) return; if (el.dataset.side === 'cn') { document.querySelectorAll(`.match-cn[data-idx="${idx}"].selected`).forEach(e => e.classList.remove('selected')); el.classList.add('selected'); window._matchSelected = el; } else if (window._matchSelected && window._matchSelected.dataset.idx === idx) { const cn = window._matchSelected; if (cn.dataset.pair === el.dataset.pair && !found.has(el.dataset.pair)) { cn.classList.add('matched'); cn.classList.remove('selected'); el.classList.add('matched'); found.add(el.dataset.pair); window._matchSelected = null; if (found.size >= document.querySelectorAll(`.match-cn[data-idx="${idx}"]`).length) { const box = document.getElementById('exBox'+idx) || document.getElementById('pEx'+idx); if (box) box.insertAdjacentHTML('beforeend','<span class="result-badge good">✓ Completo</span>'); } } } };
            window._builderState = {};
            window.initBuilder = function(idx, words) { const items = words.map(w => ({ display: w, char: w.split(' (')[0] })); items.sort(() => Math.random() - 0.5); window._builderState[idx] = { items, constructed: [], originalWords: [...words] }; renderBuilder(idx); };
            function renderBuilder(idx) { const st = window._builderState[idx]; const cDiv = document.getElementById('chips'+idx) || document.getElementById('examChips'+String(idx).replace('exam','')); const sDiv = document.getElementById('constructed'+idx) || document.getElementById('examConst'+String(idx).replace('exam','')); if (!cDiv || !sDiv) return; cDiv.innerHTML = ''; sDiv.innerHTML = ''; st.items.forEach((item, i) => { const sp = document.createElement('span'); sp.className = 'word-chip'; sp.textContent = item.display; sp.onclick = () => { st.constructed.push({ char: item.char, display: item.display }); st.items.splice(i, 1); renderBuilder(idx); }; cDiv.appendChild(sp); }); st.constructed.forEach((item, i) => { const sp = document.createElement('span'); sp.className = 'chip'; sp.textContent = item.display; sp.onclick = () => { st.items.push({ display: item.display, char: item.char }); st.constructed.splice(i, 1); renderBuilder(idx); }; sDiv.appendChild(sp); }); }
            window.resetBuilder = function(idx) { const st = window._builderState[idx]; if (st) { const words = st.originalWords || st.items.map(i => i.display); const items = words.map(w => ({ display: w, char: w.split(' (')[0] })).sort(() => Math.random() - 0.5); window._builderState[idx] = { items, constructed: [], originalWords: words }; renderBuilder(idx); } };
            window.checkBuilt = function(idx, correct) { const fb = document.getElementById('fb'+idx) || document.getElementById('examFb'+idx); const st = window._builderState[idx]; if (st && st.constructed.map(c => c.char).join('') === correct) { fb.textContent = '✓ Correcto'; fb.style.color = '#4a7a4a'; } else { fb.textContent = `✗ La frase es: ${correct}`; fb.style.color = '#b05050'; } };

            function generateFullExam(data) {
                const qs = [];
                data.vocab.forEach(v => { const wrongs = data.vocab.filter(x => x.cn !== v.cn).slice(0,4).map(x => x.es); while(wrongs.length < 4) wrongs.push('---'); const opts = [v.es, ...wrongs].sort(() => Math.random() - 0.5); qs.push({type:'choice', question:`¿Qué significa "${v.cn} (${v.pinyin})"?`, options:opts, correct:opts.indexOf(v.es)}); });
                for(let i=0; i<4; i++) { const v = data.vocab[Math.floor(Math.random()*data.vocab.length)]; const wrongs = data.vocab.filter(x => x.cn !== v.cn).slice(0,4).map(x => `${x.cn} (${x.pinyin})`); const allOpts = [`${v.cn} (${v.pinyin})`, ...wrongs]; qs.push({type:'audio-word', audio:v.audio, options:allOpts.sort(()=>Math.random()-0.5), correct:0}); }
                if(data.vocab.length >= 4) qs.push({type:'match', pairs:data.vocab.slice(0,5).map(v=>[`${v.cn} (${v.pinyin})`,v.es])});
                data.phrases.slice(0,4).forEach(p => { const clean = p.cn.replace(/[，。？！]/g,''); const chars = clean.split(''); const words = chars.map(c => { const v = data.vocab.find(x => x.cn === c); return v ? `${c} (${v.pinyin})` : (pinyinMap[c] ? `${c} (${pinyinMap[c]})` : `${c} (?)`); }); qs.push({type:'sentence-builder', words, correct:clean, instruction:`Ordena: "${p.es}"`}); });
                return qs.slice(0, 20);
            }
            function renderFullExamView() {
                const data = lessonsData[lessonKeys[currentLessonIndex]]; if (!data || !data.vocab.length) return;
                const qs = generateFullExam(data); window._currentFullExam = qs;
                qs.forEach(q => { if (q.options) { const sh = shuffleOptions(q.options, q.correct); q._options = sh.options; q._correct = sh.correct; } });
                let html = '<div class="section"><h2>📝 Examen de la lección</h2><p>20 ejercicios · Responde todo y pulsa "Ver resultados"</p>';
                qs.forEach((q, i) => {
                    html += `<div class="exercise-box" id="examQ${i}"><strong>${i+1}. ${q.question||''}</strong>`;
                    if (q.type === 'choice' || q.type === 'audio-word') {
                        if (q.type === 'audio-word') html += `<button class="btn audio-btn" onclick="window._speak('${q.audio}')">🔊</button>`;
                        q._options.forEach((o, oi) => html += `<button class="quiz-option" data-exam="${i}" data-opt="${oi}" data-correct="${q._correct}" onclick="selectExamOption(this)">${o}</button>`);
                    } else if (q.type === 'char-select') {
                        const sh = shuffleOptions(q.chars, q.chars.findIndex(c => c.startsWith(q.answer)));
                        q._options = sh.options; q._correct = sh.correct;
                        html += `<p>${q.sentence}</p>`;
                        sh.options.forEach((c, oi) => html += `<button class="char-option" data-exam="${i}" data-answer="${q.answer}" onclick="selectExamOption(this)">${c}</button>`);
                    } else if (q.type === 'match') {
                        html += '<p>Empareja:</p><div class="match-grid"><div class="match-col"><strong>Chino</strong>';
                        q.pairs.forEach((p, pi) => html += `<div class="match-item match-cn" data-pair="${pi}" data-side="cn" data-exam="${i}" onclick="selectExamMatch(this)">${p[0]}</div>`);
                        html += '</div><div class="match-col"><strong>Español</strong>';
                        const shuffled = [...q.pairs].sort(()=>Math.random()-0.5);
                        shuffled.forEach(p => html += `<div class="match-item match-es" data-pair="${q.pairs.findIndex(x=>x[0]===p[0])}" data-side="es" data-exam="${i}" onclick="selectExamMatch(this)">${p[1]}</div>`);
                        html += '</div></div>';
                    } else if (q.type === 'sentence-builder') {
                        html += `<p>${q.instruction}</p><div class="word-chips" id="examChips${i}"></div><div class="constructed-sentence" id="examConst${i}"></div>`;
                        setTimeout(() => initBuilder('exam'+i, q.words), 0);
                    }
                    html += `</div>`;
                });
                html += '<button class="btn exam-btn" style="margin-top:1rem;" onclick="gradeFullExam()">Ver resultados</button><div id="fullExamResult" class="exam-result-box" style="display:none;"></div></div>';
                document.getElementById('contentArea').innerHTML = html; updateTopbar();
            }
            window.selectExamOption = function(btn) { const parent = btn.parentElement; parent.querySelectorAll('.quiz-option, .char-option').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
            window.selectExamMatch = function(el) {
                const examIdx = el.dataset.exam; const idxKey = 'exam' + examIdx;
                if (!window._examMatchFound) window._examMatchFound = new Map();
                if (!window._examMatchFound.has(idxKey)) window._examMatchFound.set(idxKey, new Set());
                const found = window._examMatchFound.get(idxKey);
                if (el.classList.contains('matched')) return;
                if (el.dataset.side === 'cn') { document.querySelectorAll(`.match-cn[data-exam="${examIdx}"].selected`).forEach(e => e.classList.remove('selected')); el.classList.add('selected'); window._examMatchSelected = el; }
                else if (window._examMatchSelected && window._examMatchSelected.dataset.exam === examIdx) {
                    const cn = window._examMatchSelected;
                    if (cn.dataset.pair === el.dataset.pair && !found.has(el.dataset.pair)) {
                        cn.classList.add('matched'); cn.classList.remove('selected'); el.classList.add('matched'); found.add(el.dataset.pair);
                        window._examMatchSelected = null;
                        if (found.size >= document.querySelectorAll(`.match-cn[data-exam="${examIdx}"]`).length) {
                            const examBox = document.getElementById('examQ'+examIdx);
                            if (examBox) examBox.insertAdjacentHTML('beforeend','<span class="result-badge good">✓ Completo</span>');
                        }
                    }
                }
            };
            window._examMatchSelected = null; window._examMatchFound = new Map();
            window.gradeFullExam = function() {
                const qs = window._currentFullExam; let score = 0;
                const resultDiv = document.getElementById('fullExamResult'); resultDiv.style.display = 'block';
                qs.forEach((q, i) => {
                    const box = document.getElementById('examQ'+i); if (!box) return;
                    let isCorrect = false;
                    if (q.type === 'choice' || q.type === 'audio-word') { const selected = box.querySelector('.quiz-option.selected'); if (selected) { const opt = parseInt(selected.dataset.opt); if (opt === q._correct) { isCorrect = true; score++; } } }
                    else if (q.type === 'char-select') { const selected = box.querySelector('.char-option.selected'); if (selected && selected.dataset.char === q.answer) { isCorrect = true; score++; } }
                    else if (q.type === 'match') { isCorrect = [...box.querySelectorAll('.match-cn')].every(el => el.classList.contains('matched')); if (isCorrect) score++; }
                    else if (q.type === 'sentence-builder') { const st = window._builderState['exam'+i]; if (st && st.constructed.map(c=>c.char).join('') === q.correct) { isCorrect = true; score++; } }
                    const corrDiv = box.querySelector('.exam-correction') || (()=>{const d=document.createElement('div');d.className='exam-correction';box.appendChild(d);return d;})();
                    corrDiv.className = 'exam-correction ' + (isCorrect ? 'correct-ans' : 'wrong-ans');
                    corrDiv.innerHTML = isCorrect ? '✓ Correcto' : '✗'; corrDiv.style.display = 'block';
                });
                const pct = Math.round(score / qs.length * 100);
                resultDiv.innerHTML = `<h3>${pct>=60?'🎉 ¡Aprobado!':'📚 Sigue practicando'}</h3><p>Nota: ${score}/${qs.length}</p><p>${pct}%</p>`;
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            };

            window.openGamesView = () => { currentView = 'games'; document.getElementById('contentArea').innerHTML = '<h2>🎮 Juegos</h2><p>Próximamente.</p>'; updateTopbar(); closeSidebarOnMobile(); };
            window.openStoriesView = () => { currentView = 'stories'; document.getElementById('contentArea').innerHTML = '<h2>📖 Historias</h2><p>Próximamente.</p>'; updateTopbar(); closeSidebarOnMobile(); };

            updateSidebar(); navigateTo(0);
        })();
    </script>
</body>
</html>
